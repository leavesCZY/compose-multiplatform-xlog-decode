name: Build & Release

on:
  push:
    branches: [ master ]
    paths:
      - "**/workflows-trigger.properties"

  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release Notes"
        required: false
        default: "Auto-generated release from GitHub Actions."

env:
  DEFAULT_RELEASE_NOTES: "Auto-generated release from GitHub Actions."

permissions:
  contents: write

jobs:
  build-and-package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x86_64
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-15-intel
            platform: macos-x86_64
          - os: macos-latest
            platform: macos-arm64
    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "zulu"
          cache: "gradle"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Package Release Distribution
        run: ./gradlew packageReleaseDistributionForCurrentOS

      - name: Rename and Prepare Artifacts
        shell: bash
        run: |
          OUT_DIR="build/compose/binaries/main-release"
          mkdir -p ./ready-to-upload
          
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv $OUT_DIR/exe/*.exe ./ready-to-upload/compose-multiplatform-xlog-decode-${{ matrix.platform }}.exe
            7z a -tzip ./ready-to-upload/compose-multiplatform-xlog-decode-${{ matrix.platform }}.zip ./$OUT_DIR/app/*
          
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            mv $OUT_DIR/rpm/*.rpm ./ready-to-upload/compose-multiplatform-xlog-decode-${{ matrix.platform }}.rpm
            mv $OUT_DIR/deb/*.deb ./ready-to-upload/compose-multiplatform-xlog-decode-${{ matrix.platform }}.deb
          
          else # macOS
            mv $OUT_DIR/dmg/*.dmg ./ready-to-upload/compose-multiplatform-xlog-decode-${{ matrix.platform }}.dmg
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-${{ matrix.platform }}
          path: ./ready-to-upload/*
          retention-days: 1

  release:
    needs: [ build-and-package ]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./release-artifacts
          pattern: artifacts-*
          merge-multiple: true

      - name: Generate Tag
        id: date
        run: echo "now=$(TZ='Asia/Shanghai' date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          generateReleaseNotes: false
          artifactErrorsFailBuild: true
          artifacts: "./release-artifacts/*"
          body: ${{ github.event.inputs.release_notes || env.DEFAULT_RELEASE_NOTES }}
          tag: ${{ steps.date.outputs.now }}
          name: ${{ steps.date.outputs.now }}
          token: ${{ secrets.GITHUB_TOKEN }}